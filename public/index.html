<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coding Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0e0f;
    --panel: #131619;
    --panel-raised: #191d21;
    --border: #262b2f;
    --text: #e6e9ea;
    --text-dim: #8a9298;
    --text-faint: #565d62;
    --accent: #7ee787;
    --accent-dim: #2e5f34;
    --amber: #e3b341;
    --red: #f47067;
    --focus: #58a6ff;
    --surface: #0a0b0c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
  }
  code, .mono { font-family: 'JetBrains Mono', monospace; }
  ::selection { background: var(--accent-dim); }
  a { color: var(--focus); }
  button:focus-visible, select:focus-visible, textarea:focus-visible, input:focus-visible {
    outline: 2px solid var(--focus); outline-offset: 2px;
  }
  #root { min-height: 100vh; }
  .app-shell {
    max-width: 1280px; margin: 0 auto; padding: 24px 24px 80px;
    display: grid; gap: 22px;
  }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    box-shadow: 0 18px 45px rgba(0, 0, 0, 0.2);
  }
  .chat-card {
    padding: 22px;
    display: grid; gap: 16px;
  }
  .chat-layout {
    display: grid;
    grid-template-columns: minmax(0, 1.5fr) minmax(280px, 0.55fr);
    gap: 16px;
    align-items: start;
  }
  .chat-sidepanel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: grid;
    gap: 12px;
    position: sticky;
    top: 20px;
  }
  .sidepanel-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .sidepanel-copy {
    color: var(--text-faint);
    font-size: 13px;
    line-height: 1.5;
  }
  .step-list {
    display: grid;
    gap: 8px;
  }
  .step-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 9px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 13px;
    background: rgba(255,255,255,0.02);
  }
  .step-item.active {
    border-color: rgba(126,231,135,0.35);
    color: var(--text);
    background: rgba(126,231,135,0.08);
  }
  .step-item.complete {
    border-color: rgba(126,231,135,0.18);
    color: var(--text);
    background: rgba(126,231,135,0.05);
  }
  .step-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }
  .chat-toolbar {
    display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  .chat-header {
    display: flex; align-items: center; gap: 10px;
  }
  .chat-title {
    font-size: 18px; font-weight: 700; letter-spacing: -0.01em;
  }
  .chat-subtitle {
    color: var(--text-dim); font-size: 13px; margin-top: 2px;
  }
  .toolbar-actions {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .ghost-btn {
    border-radius: 8px; border: 1px solid var(--border); background: var(--panel-raised);
    color: var(--text); padding: 8px 12px; font-size: 13px; cursor: pointer;
  }
  .chat-window {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    min-height: 340px; max-height: 480px; overflow: auto; padding: 14px;
    display: grid; gap: 12px;
  }
  .message-row { display: flex; }
  .message-row.user { justify-content: flex-end; }
  .message-bubble {
    max-width: min(84%, 760px); padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border);
    line-height: 1.55; font-size: 14px; white-space: pre-wrap;
  }
  .message-row.user .message-bubble {
    background: linear-gradient(135deg, rgba(126,231,135,0.16), rgba(88,166,255,0.12)); border-color: rgba(126,231,135,0.18);
  }
  .message-row.assistant .message-bubble {
    background: var(--panel-raised);
  }
  .message-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); margin-bottom: 6px;
  }
  .message-markdown p { margin: 0 0 10px; }
  .message-markdown p:last-child { margin-bottom: 0; }
  .message-markdown ul, .message-markdown ol { margin: 8px 0 10px 18px; padding: 0; }
  .message-markdown code { background: rgba(255,255,255,0.08); border-radius: 4px; padding: 0.1em 0.3em; }
  .message-markdown pre { margin: 10px 0 0; border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); }
  .message-markdown pre code { display: block; padding: 12px 14px; overflow: auto; background: #08090a; }
  .code-block { margin: 10px 0 0; }
  .code-block-toolbar {
    display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 8px 10px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-bottom: none; border-radius: 10px 10px 0 0;
    font-size: 12px; color: var(--text-dim);
  }
  .copy-btn {
    border: none; border-radius: 6px; padding: 4px 8px; background: rgba(88,166,255,0.16); color: var(--text); cursor: pointer;
    font-size: 12px;
  }
  .chat-empty {
    color: var(--text-faint); padding: 26px 8px; text-align: center; line-height: 1.7;
  }
  .composer {
    display: flex; flex-direction: column; gap: 10px;
  }
  .composer-row {
    display: flex; gap: 10px; align-items: flex-end;
  }
  .composer textarea {
    flex: 1; min-height: 94px; resize: vertical; border-radius: 10px; padding: 11px 12px; background: var(--panel-raised);
    color: var(--text); border: 1px solid var(--border);
    font-size: 14px; line-height: 1.5;
  }
  .composer button.primary { border-radius: 10px; border: none; background: var(--accent); color: #07110a; padding: 11px 16px; cursor: pointer; font-weight: 700; }
  .composer button:disabled { opacity: 0.6; cursor: not-allowed; }
  .model-select {
    width: 100%; max-width: 240px; background: var(--panel-raised); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 8px 10px; font-size: 13px;
  }
  .helper-text {
    color: var(--text-faint); font-size: 12px; line-height: 1.5;
  }
  .dashboard-grid {
    max-width: 1280px; margin: 0 auto; padding: 0 24px 80px;
    display: grid; grid-template-columns: minmax(0, 440px) minmax(0, 1fr); gap: 22px;
    align-items: start;
  }
  @media (max-width: 860px) {
    .dashboard-grid { grid-template-columns: 1fr; padding: 0 18px 60px; }
    .dashboard-grid > *:last-child { position: static !important; max-height: none !important; }
    .chat-layout { grid-template-columns: 1fr; }
    .chat-sidepanel { position: static; }
    .composer-row { flex-direction: column; align-items: stretch; }
    .model-select { max-width: none; }
  }
  #root-fallback {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
    color: var(--text-faint); font-family: 'JetBrains Mono', monospace; font-size: 13px;
  }
  #boot-error {
    display: none; max-width: 560px; margin: 80px auto; padding: 20px 22px;
    background: #1a1010; border: 1px solid #4a2323; border-radius: 10px;
    color: #f47067; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.6;
    white-space: pre-wrap;
  }
</style>
</head>
<body>
<div id="root"><div id="root-fallback">Loading…</div></div>
<div id="boot-error"></div>

<script>
  window.addEventListener('error', function (e) {
    var box = document.getElementById('boot-error');
    if (!box) return;
    box.style.display = 'block';
    box.textContent = 'UI failed to load: ' + (e.message || e.error || 'unknown error') +
      (e.filename ? '\n(' + e.filename + ':' + e.lineno + ')' : '');
  });
</script>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.28.4/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;
const CHAT_STORAGE_KEY = 'coding-agent-chat-v1';

async function getJSON(url, opts) {
  const r = await fetch(url, { credentials: 'same-origin', ...opts });
  let data = null;
  try { data = await r.json(); } catch (_) {}
  if (!r.ok) throw Object.assign(new Error((data && data.error) || r.statusText), { status: r.status, data });
  return data;
}

function BranchMark({ size = 22, color = 'var(--accent)' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="6" cy="5" r="2.4" stroke={color} strokeWidth="1.6"/>
      <circle cx="6" cy="19" r="2.4" stroke={color} strokeWidth="1.6"/>
      <circle cx="18" cy="12" r="2.4" stroke={color} strokeWidth="1.6"/>
      <path d="M6 7.4V16.6" stroke={color} strokeWidth="1.6"/>
      <path d="M6 8C6 12 10 12 15.7 12" stroke={color} strokeWidth="1.6"/>
    </svg>
  );
}

function TopBar({ session, onLogout }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: '18px 28px', borderBottom: '1px solid var(--border)',
      background: 'var(--panel)'
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <BranchMark />
        <div>
          <div style={{ fontWeight: 700, fontSize: 16, letterSpacing: '-0.01em' }}>Coding Agent</div>
          <div className="mono" style={{ fontSize: 11, color: 'var(--text-faint)' }}>chat · aider · NVIDIA NIM</div>
        </div>
      </div>
      {session && session.loggedIn ? (
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <span className="mono" style={{ fontSize: 13, color: 'var(--text-dim)' }}>
            <span style={{ color: 'var(--accent)' }}>●</span> {session.githubLogin || 'connected'}
          </span>
          <button onClick={onLogout} style={{
            background: 'transparent', border: '1px solid var(--border)', color: 'var(--text-dim)',
            borderRadius: 6, padding: '6px 12px', fontSize: 13, cursor: 'pointer'
          }}>Disconnect</button>
        </div>
      ) : null}
    </div>
  );
}

function ConnectScreen({ githubConfigured }) {
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      minHeight: '70vh', padding: 24, textAlign: 'center'
    }}>
      <BranchMark size={40} />
      <h1 style={{ fontSize: 22, marginTop: 18, marginBottom: 8, fontWeight: 700 }}>Connect a GitHub account</h1>
      <p style={{ color: 'var(--text-dim)', maxWidth: 420, lineHeight: 1.6, marginBottom: 26 }}>
        The agent needs repo access to clone, branch, and open pull requests on your behalf.
        Your token stays server-side — it's never sent to this page.
      </p>
      {githubConfigured ? (
        <a href="/auth/github" style={{
          display: 'inline-flex', alignItems: 'center', gap: 10, textDecoration: 'none',
          background: 'var(--text)', color: 'var(--bg)', fontWeight: 600, fontSize: 14,
          padding: '11px 20px', borderRadius: 8
        }}>
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          Connect GitHub
        </a>
      ) : (
        <div className="mono" style={{
          fontSize: 12.5, color: 'var(--amber)', border: '1px solid #4d3d1a', background: '#1f1a0d',
          borderRadius: 8, padding: '12px 16px', maxWidth: 460, textAlign: 'left', lineHeight: 1.7
        }}>
          GITHUB_CLIENT_ID isn't set on the server yet.<br/>
          Register an OAuth App at github.com/settings/developers, then set
          GITHUB_CLIENT_ID / GITHUB_CLIENT_SECRET / APP_BASE_URL in Railway.
        </div>
      )}
    </div>
  );
}

const labelStyle = {
  display: 'block', fontSize: 12, fontWeight: 600, color: 'var(--text-dim)',
  textTransform: 'uppercase', letterSpacing: '0.04em', marginBottom: 8
};
const inputStyle = {
  width: '100%', background: 'var(--panel-raised)', border: '1px solid var(--border)',
  color: 'var(--text)', borderRadius: 8, padding: '11px 12px', fontSize: 14,
  fontFamily: 'inherit'
};

function RepoSelect({ repos, value, onChange, loading, error }) {
  return (
    <div>
      <label style={labelStyle}>Repository</label>
      {loading ? (
        <div className="mono" style={{ color: 'var(--text-faint)', fontSize: 13, padding: '10px 0' }}>Loading repos…</div>
      ) : error ? (
        <div className="mono" style={{ color: 'var(--red)', fontSize: 13, padding: '10px 0' }}>{error}</div>
      ) : (
        <select value={value} onChange={onChange} style={inputStyle}>
          <option value="">Select a repo…</option>
          {repos.map((r) => (
            <option key={r.fullName} value={r.fullName}>{r.fullName}{r.private ? ' 🔒' : ''}</option>
          ))}
        </select>
      )}
    </div>
  );
}

function buildMarkdownHtml(markdown) {
  if (!window.marked) return `<p>${String(markdown || '').replace(/[&<>"']/g, (char) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]))}</p>`;
  const renderer = new window.marked.Renderer();
  renderer.code = function ({ text, lang }) {
    const language = lang || '';
    const code = String(text).replace(/[&<>"']/g, (char) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    const encoded = encodeURIComponent(text);
    return `<div class="code-block"><div class="code-block-toolbar"><span>${language || 'code'}</span><button type="button" class="copy-btn" data-code="${encoded}">Copy</button></div><pre><code class="language-${language}">${code}</code></pre></div>`;
  };
  const html = window.marked.parse(markdown || '', { breaks: true, gfm: true, renderer });
  return typeof html === 'string' ? html : '';
}

function MessageContent({ content }) {
  const [html, setHtml] = useState('');
  const containerRef = useRef(null);

  useEffect(() => {
    setHtml(buildMarkdownHtml(content));
  }, [content]);

  useEffect(() => {
    if (!containerRef.current) return;
    const buttons = containerRef.current.querySelectorAll('.copy-btn');
    const handlers = [];
    buttons.forEach((button) => {
      const handler = async () => {
        const raw = button.getAttribute('data-code') || '';
        const text = decodeURIComponent(raw);
        try {
          await navigator.clipboard.writeText(text);
          const prev = button.textContent;
          button.textContent = 'Copied';
          window.setTimeout(() => { button.textContent = prev; }, 1200);
        } catch (_) {}
      };
      button.addEventListener('click', handler);
      handlers.push(handler);
    });
    return () => {
      buttons.forEach((button, index) => button.removeEventListener('click', handlers[index]));
    };
  }, [html]);

  return <div ref={containerRef} className="message-markdown" dangerouslySetInnerHTML={{ __html: html }} />;
}

function ChatPanel({ models, defaultModel, repos, reposLoading, reposError }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [selectedModel, setSelectedModel] = useState(defaultModel || '');
  const [repoFullName, setRepoFullName] = useState('');
  const [baseBranch, setBaseBranch] = useState('main');
  const [branches, setBranches] = useState([]);
  const [branchesLoading, setBranchesLoading] = useState(false);
  const [branchesError, setBranchesError] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [activitySteps, setActivitySteps] = useState([]);
  const [activeStep, setActiveStep] = useState(0);
  const endRef = useRef(null);
  const activityTimerRef = useRef(null);

  useEffect(() => {
    try {
      const raw = window.localStorage.getItem(CHAT_STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed.messages) setMessages(parsed.messages);
        if (parsed.model) setSelectedModel(parsed.model);
        if (parsed.repo) setRepoFullName(parsed.repo);
        if (parsed.baseBranch) setBaseBranch(parsed.baseBranch);
      }
    } catch (_) {}
  }, []);

  useEffect(() => {
    if (!defaultModel) return;
    setSelectedModel((prev) => prev || defaultModel);
  }, [defaultModel]);

  useEffect(() => {
    const repo = repos.find((r) => r.fullName === repoFullName);
    if (!repo) { setBranches([]); return; }

    // Pre-fill with the known default branch immediately so the field isn't
    // empty while the real branch list loads.
    setBaseBranch((prev) => prev || repo.defaultBranch || 'main');

    let cancelled = false;
    setBranchesLoading(true);
    setBranchesError('');
    getJSON(`/api/branches?repo=${encodeURIComponent(repo.fullName)}`)
      .then((d) => {
        if (cancelled) return;
        const names = d.branches || [];
        setBranches(names);
        // Snap to a branch that actually exists on this repo, preferring
        // whatever was already selected, then the repo's real default branch.
        setBaseBranch((prev) => {
          if (names.includes(prev)) return prev;
          if (repo.defaultBranch && names.includes(repo.defaultBranch)) return repo.defaultBranch;
          return names[0] || repo.defaultBranch || 'main';
        });
      })
      .catch((e) => { if (!cancelled) setBranchesError(e.message); })
      .finally(() => { if (!cancelled) setBranchesLoading(false); });

    return () => { cancelled = true; };
  }, [repoFullName, repos]);

  useEffect(() => {
    try {
      window.localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify({ messages, model: selectedModel, repo: repoFullName, baseBranch }));
    } catch (_) {}
  }, [messages, selectedModel, repoFullName, baseBranch]);

  useEffect(() => {
    endRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, loading]);

  useEffect(() => {
    return () => {
      if (activityTimerRef.current) window.clearTimeout(activityTimerRef.current);
    };
  }, []);

  const launchActivityFlow = useCallback((steps) => {
    if (activityTimerRef.current) window.clearTimeout(activityTimerRef.current);
    setActivitySteps(steps);
    setActiveStep(0);
    if (!steps.length) return;

    let index = 0;
    const tick = () => {
      if (index >= steps.length) {
        setActiveStep(steps.length - 1);
        return;
      }
      setActiveStep(index);
      index += 1;
      activityTimerRef.current = window.setTimeout(tick, 900);
    };
    activityTimerRef.current = window.setTimeout(tick, 500);
  }, []);

  const stopActivityFlow = useCallback(() => {
    if (activityTimerRef.current) {
      window.clearTimeout(activityTimerRef.current);
      activityTimerRef.current = null;
    }
    setActiveStep(0);
    setActivitySteps([]);
  }, []);

  const handleSend = useCallback(async (event) => {
    event.preventDefault();
    const userPrompt = input.trim();
    if (!userPrompt || loading) return;

    const nextMessages = [...messages, { role: 'user', content: userPrompt }];
    setMessages(nextMessages);
    setInput('');
    setError('');
    setLoading(true);

    const selectedRepo = repos.find((r) => r.fullName === repoFullName);
    const isActionRequest = /\b(add|create|build|change|modify|implement|fix|update|refactor|remove|write|generate|make|optimize|debug|patch|improve)\b/i.test(userPrompt);
    const isRepoQuestion = Boolean(selectedRepo) && /\b(repo|repository|project|this app|this project|what does|what is|explain|summarize|tell me about|overview|architecture|structure|main files|entry points|source files)\b/i.test(userPrompt);
    const shouldRunAgent = Boolean(selectedRepo && isActionRequest);
    const initialSteps = shouldRunAgent
      ? ['Preparing request', 'Cloning repository', 'Reading relevant files', 'Writing files', 'Committing changes', 'Opening pull request']
      : ['Preparing request', 'Inspecting repository', 'Reading key files', 'Sending context to AI', 'Generating answer'];
    launchActivityFlow(initialSteps);

    try {
      let assistantMessage = '';
      if (shouldRunAgent) {
        const data = await getJSON('/agent/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            repoUrl: selectedRepo ? selectedRepo.htmlUrl : `https://github.com/${repoFullName}`,
            task: userPrompt,
            baseBranch,
            model: selectedModel || defaultModel || undefined,
          }),
        });
        const logLines = Array.isArray(data.log) ? data.log : [];
        assistantMessage = data.changed
          ? `Implemented the requested change.\n\nPR: ${data.prUrl || 'n/a'}\n\n${logLines.map((line) => `- ${line}`).join('\n')}`
          : `No changes were needed for this task.\n\n${logLines.map((line) => `- ${line}`).join('\n')}`;
      } else {
        const data = await getJSON('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [
              { role: 'system', content: 'You are a helpful coding assistant. Answer clearly in markdown. If asked for code, provide concise code blocks. When asked about a repository, explain what it does and mention likely entry points.' },
              ...nextMessages,
            ],
            model: selectedModel || defaultModel || undefined,
            repoUrl: isRepoQuestion && selectedRepo ? selectedRepo.htmlUrl : undefined,
            baseBranch: isRepoQuestion ? baseBranch : undefined,
          }),
        });
        assistantMessage = data.message || 'No response returned.';
      }
      setMessages([...nextMessages, { role: 'assistant', content: assistantMessage }]);
    } catch (e) {
      setMessages([...nextMessages, { role: 'assistant', content: `Sorry, I could not respond. ${e.message}` }]);
      setError(e.message);
    } finally {
      setLoading(false);
      stopActivityFlow();
    }
  }, [baseBranch, defaultModel, input, launchActivityFlow, loading, messages, repoFullName, repos, selectedModel, stopActivityFlow]);

  const resetChat = useCallback(() => {
    setMessages([]);
    setInput('');
    setError('');
    stopActivityFlow();
    try {
      window.localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify({ messages: [], model: selectedModel, repo: repoFullName, baseBranch }));
    } catch (_) {}
  }, [baseBranch, repoFullName, selectedModel, stopActivityFlow]);

  const selectedRepo = repos.find((r) => r.fullName === repoFullName);
  // Real branches from GitHub; fall back to just the current value while
  // loading (or if the lookup failed) so the select isn't empty.
  const branchOptions = branches.length > 0
    ? branches
    : [baseBranch, selectedRepo?.defaultBranch].filter(Boolean).filter((v, i, arr) => arr.indexOf(v) === i);

  return (
    <div className="chat-layout">
      <div className="card chat-card">
        <div className="chat-toolbar">
          <div className="chat-header">
            <BranchMark size={18} />
            <div>
              <div className="chat-title">One prompt box</div>
              <div className="chat-subtitle">Ask anything or request a repo change. The answer appears here in markdown.</div>
            </div>
          </div>
          <div className="toolbar-actions">
            <select className="model-select mono" value={selectedModel} onChange={(e) => setSelectedModel(e.target.value)}>
              {models.length === 0 && <option value="">Loading…</option>}
              {models.map((m) => <option key={m} value={m}>{m}</option>)}
            </select>
            <button className="ghost-btn" onClick={resetChat}>New chat</button>
          </div>
        </div>

        <div style={{ display: 'grid', gap: 12 }}>
          <div style={{ display: 'grid', gap: 10, gridTemplateColumns: '1.4fr 0.6fr', alignItems: 'end' }}>
            <div>
              <label style={labelStyle}>Repository</label>
              {reposLoading ? (
                <div className="mono" style={{ color: 'var(--text-faint)', fontSize: 13, padding: '8px 0' }}>Loading repos…</div>
              ) : reposError ? (
                <div className="mono" style={{ color: 'var(--red)', fontSize: 13, padding: '8px 0' }}>{reposError}</div>
              ) : (
                <select value={repoFullName} onChange={(e) => setRepoFullName(e.target.value)} style={inputStyle}>
                  <option value="">No repo selected</option>
                  {repos.map((r) => <option key={r.fullName} value={r.fullName}>{r.fullName}{r.private ? ' 🔒' : ''}</option>)}
                </select>
              )}
            </div>
            <div>
              <label style={labelStyle}>Base branch</label>
              <select
                className="mono"
                style={inputStyle}
                value={baseBranch}
                onChange={(e) => setBaseBranch(e.target.value)}
                disabled={branchesLoading || !repoFullName}
              >
                {branchesLoading && <option>Loading branches…</option>}
                {!branchesLoading && branchOptions.map((branch) => <option key={branch} value={branch}>{branch}</option>)}
              </select>
              {branchesError && (
                <div className="mono" style={{ color: 'var(--red)', fontSize: 12, marginTop: 4 }}>{branchesError}</div>
              )}
            </div>
          </div>
        </div>

        <div className="chat-window">
          {messages.length === 0 && !loading && (
            <div className="chat-empty">
              Ask what this repository does, request code, or describe a change you want made.<br />
              The reply renders as markdown and code blocks include a copy button.
            </div>
          )}
          {messages.map((message, index) => (
            <div key={`${message.role}-${index}`} className={`message-row ${message.role}`}>
              <div className="message-bubble">
                <div className="message-label">{message.role === 'user' ? 'You' : 'Assistant'}</div>
                <MessageContent content={message.content} />
              </div>
            </div>
          ))}
          {loading && (
            <div className="message-row assistant">
              <div className="message-bubble">
                <div className="message-label">Assistant</div>
                <div className="helper-text">Thinking…</div>
              </div>
            </div>
          )}
          <div ref={endRef} />
        </div>

        <form className="composer" onSubmit={handleSend}>
          <div className="composer-row">
            <textarea
              value={input}
              onChange={(e) => setInput(e.target.value)}
              placeholder="Ask a question or tell the agent what to change in the selected repo…"
              onKeyDown={(event) => {
                if (event.key === 'Enter' && !event.shiftKey) {
                  event.preventDefault();
                  handleSend(event);
                }
              }}
            />
            <button className="primary" type="submit" disabled={!input.trim() || loading}>Send</button>
          </div>
          {error ? <div className="helper-text" style={{ color: 'var(--red)' }}>{error}</div> : <div className="helper-text">If you ask for an implementation change and a repo is selected, the app will run it and show the result here.</div>}
        </form>
      </div>

      <aside className="chat-sidepanel">
        <div className="sidepanel-title">Agent flow</div>
        <div className="sidepanel-copy">A lightweight activity panel shows the request stages while the agent works.</div>
        <div className="step-list">
          {(activitySteps.length === 0 ? ['Ready when you send a prompt'] : activitySteps).map((step, index) => {
            const isComplete = activitySteps.length > 0 && index < activeStep;
            const isActive = activitySteps.length > 0 && index === activeStep;
            const stateClass = isComplete ? 'complete' : isActive ? 'active' : '';
            return (
              <div key={`${step}-${index}`} className={`step-item ${stateClass}`.trim()}>
                <span className="step-dot" />
                <span>{step}</span>
              </div>
            );
          })}
        </div>
      </aside>
    </div>
  );
}

function Spinner() {
  return (
    <span className="mono" style={{
      display: 'inline-block', width: 13, height: 13, border: '2px solid rgba(12,14,15,0.35)',
      borderTopColor: '#0c0e0f', borderRadius: '50%', animation: 'spin 0.7s linear infinite'
    }} />
  );
}

function Dashboard({ session, onLogout }) {
  const [repos, setRepos] = useState([]);
  const [reposLoading, setReposLoading] = useState(true);
  const [reposError, setReposError] = useState(null);
  const [models, setModels] = useState([]);
  const [defaultModel, setDefaultModel] = useState('');
  const [repoFullName, setRepoFullName] = useState('');
  const [baseBranch, setBaseBranch] = useState('main');
  const [model, setModel] = useState('');
  const [task, setTask] = useState('');
  const [running, setRunning] = useState(false);
  const [result, setResult] = useState(null);
  const [runError, setRunError] = useState(null);
  const logEndRef = useRef(null);

  useEffect(() => {
    getJSON('/api/repos')
      .then((d) => setRepos(d.repos || []))
      .catch((e) => setReposError(e.message))
      .finally(() => setReposLoading(false));
    getJSON('/api/models')
      .then((d) => { setModels(d.models || []); setDefaultModel(d.default || ''); setModel(d.default || ''); })
      .catch(() => {});
  }, []);

  useEffect(() => {
    const repo = repos.find((r) => r.fullName === repoFullName);
    if (repo) setBaseBranch(repo.defaultBranch || 'main');
  }, [repoFullName, repos]);

  useEffect(() => {
    if (logEndRef.current) logEndRef.current.scrollIntoView({ behavior: 'smooth' });
  }, [result, running]);

  const canRun = repoFullName && task.trim() && !running;
  const selectedRepo = repos.find((r) => r.fullName === repoFullName);
  const branchOptions = [selectedRepo?.defaultBranch, 'main', 'master', 'develop', 'staging'].filter(Boolean);

  const runAgent = useCallback(async () => {
    if (!canRun) return;
    setRunning(true);
    setResult(null);
    setRunError(null);
    const repo = repos.find((r) => r.fullName === repoFullName);
    try {
      const data = await getJSON('/agent/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          repoUrl: repo ? repo.htmlUrl : `https://github.com/${repoFullName}`,
          task: task.trim(),
          baseBranch,
          model: model || undefined,
        }),
      });
      setResult(data);
    } catch (e) {
      setRunError(e.message);
      if (e.data) setResult(e.data);
      if (e.data && e.data.reconnectRequired) {
        setTimeout(() => window.location.reload(), 1800);
      }
    } finally {
      setRunning(false);
    }
  }, [canRun, repoFullName, repos, task, baseBranch, model]);

  return (
    <div className="dashboard-grid">
      <div className="card" style={{ padding: 26 }}>
        <div style={{ display: 'grid', gap: 18 }}>
          <RepoSelect repos={repos} value={repoFullName} onChange={(e) => setRepoFullName(e.target.value)} loading={reposLoading} error={reposError} />
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
            <div>
              <label style={labelStyle}>Base branch</label>
              <select className="mono" style={inputStyle} value={baseBranch} onChange={(e) => setBaseBranch(e.target.value)}>
                {branchOptions.map((branch) => <option key={branch} value={branch}>{branch}</option>)}
              </select>
            </div>
            <div>
              <label style={labelStyle}>Model</label>
              <select className="mono" style={inputStyle} value={model} onChange={(e) => setModel(e.target.value)}>
                {models.length === 0 && <option value="">Loading…</option>}
                {models.map((m) => <option key={m} value={m}>{m}{m === defaultModel ? ' (default)' : ''}</option>)}
              </select>
            </div>
          </div>
          <div>
            <label style={labelStyle}>Task</label>
            <textarea style={{ ...inputStyle, minHeight: 110, resize: 'vertical', lineHeight: 1.5 }} value={task} onChange={(e) => setTask(e.target.value)} placeholder="Add input validation to the signup form and return a 400 with a clear message on invalid email" />
          </div>
          <button onClick={runAgent} disabled={!canRun} style={{ justifySelf: 'start', display: 'flex', alignItems: 'center', gap: 8, background: canRun ? 'var(--accent)' : 'var(--panel-raised)', color: canRun ? '#0c0e0f' : 'var(--text-faint)', border: 'none', borderRadius: 8, padding: '11px 22px', fontWeight: 700, fontSize: 14, cursor: canRun ? 'pointer' : 'not-allowed' }}>
            {running ? (<><Spinner /> Running…</>) : 'Run agent'}
          </button>
        </div>
      </div>
      <ResultPanel running={running} result={result} runError={runError} logEndRef={logEndRef} />
    </div>
  );
}

function ResultPanel({ running, result, runError, logEndRef }) {
  const log = (result && result.log) || [];
  const changed = result && result.changed;
  const ok = result && result.ok;
  const hasContent = running || result || runError;

  return (
    <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 12, padding: '18px 20px', fontFamily: 'JetBrains Mono, monospace', fontSize: 12.5, position: 'sticky', top: 24, maxHeight: 'calc(100vh - 48px)', overflowY: 'auto' }}>
      <div style={{ color: 'var(--text-faint)', marginBottom: 10, fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.05em', position: 'sticky', top: -18, background: 'var(--surface)', paddingTop: 2 }}>Run log</div>
      {!hasContent && <div style={{ color: 'var(--text-faint)', padding: '2px 0' }}>Pick a repo, describe a task, and run — output streams in here.</div>}
      {log.map((line, i) => <div key={i} style={{ color: 'var(--text-dim)', padding: '2px 0', display: 'flex', gap: 8 }}><span style={{ color: 'var(--text-faint)' }}>›</span>{line}</div>)}
      {running && <div style={{ color: 'var(--accent)', padding: '2px 0', display: 'flex', gap: 8 }}><span>›</span> working…</div>}
      {runError && !result && <div style={{ color: 'var(--red)', marginTop: 10 }}>{runError}</div>}
      {result && result.reconnectRequired && <div style={{ color: 'var(--red)', marginTop: 12 }}>Your GitHub connection expired. Reconnecting…</div>}
      {result && ok && changed === false && <div style={{ color: 'var(--amber)', marginTop: 12 }}>No changes were needed for this task.</div>}
      {result && ok && changed && result.prUrl && <div style={{ marginTop: 14, paddingTop: 14, borderTop: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 10 }}><span style={{ color: 'var(--accent)' }}>✓ PR opened</span><a href={result.prUrl} target="_blank" rel="noreferrer" style={{ color: 'var(--focus)' }}>{result.prUrl}</a></div>}
      {result && result.ok === false && !result.reconnectRequired && <div style={{ color: 'var(--red)', marginTop: 12 }}>{result.error}</div>}
      <div ref={logEndRef} />
    </div>
  );
}

function App() {
  const [session, setSession] = useState(null);
  const [loadingSession, setLoadingSession] = useState(true);
  const [models, setModels] = useState([]);
  const [defaultModel, setDefaultModel] = useState('');
  const [repos, setRepos] = useState([]);
  const [reposLoading, setReposLoading] = useState(true);
  const [reposError, setReposError] = useState(null);

  const loadSession = useCallback(() => {
    getJSON('/api/session').then(setSession).catch(() => setSession({ loggedIn: false })).finally(() => setLoadingSession(false));
  }, []);

  useEffect(() => { loadSession(); }, [loadSession]);
  useEffect(() => {
    getJSON('/api/models').then((d) => { setModels(d.models || []); setDefaultModel(d.default || ''); }).catch(() => {});
    getJSON('/api/repos').then((d) => setRepos(d.repos || [])).catch((e) => setReposError(e.message)).finally(() => setReposLoading(false));
  }, []);

  const onLogout = useCallback(async () => {
    await fetch('/auth/logout', { method: 'POST' });
    loadSession();
  }, [loadSession]);

  if (loadingSession) return null;

  return (
    <React.Fragment>
      <TopBar session={session} onLogout={onLogout} />
      {session && session.loggedIn ? (
        <div className="app-shell">
          <ChatPanel models={models} defaultModel={defaultModel} repos={repos} reposLoading={reposLoading} reposError={reposError} />
        </div>
      ) : (
        <ConnectScreen githubConfigured={true} />
      )}
    </React.Fragment>
  );
}

const styleTag = document.createElement('style');
styleTag.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(styleTag);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
